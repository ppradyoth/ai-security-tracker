name: Fetch All Issues & Classify with TinyLlama

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  fetch-and-classify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh

      - name: Restore TinyLlama from release
        run: |
          gh release download model-assets \
            --pattern "tinyllama-model.tar.gz" \
            --output /tmp/tinyllama-model.tar.gz
          mkdir -p ~/.ollama
          tar -xzf /tmp/tinyllama-model.tar.gz -C ~/.ollama
          echo "✅ TinyLlama model restored from release"
          du -sh ~/.ollama/models/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Ollama server
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          sleep 3
          ollama list

      - name: Fetch ALL issues and PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          python scripts/fetch_security_data.py > /tmp/raw_items.json 2> /tmp/fetch.log
          cat /tmp/fetch.log >&2
          echo "Raw items fetched: $(jq '.total_items_found' /tmp/raw_items.json 2>/dev/null || echo 'N/A')"

      - name: Classify with TinyLlama
        run: |
          python scripts/analyze_with_tinyllama.py /tmp/raw_items.json > /tmp/classified_items.json 2> /tmp/classify.log
          cat /tmp/classify.log >&2

      - name: Generate dashboard data
        run: |
          mkdir -p docs
          python scripts/generate_dashboard_data.py /tmp/classified_items.json > docs/data.json 2> /tmp/dashboard.log
          cat /tmp/dashboard.log >&2

      - name: Save daily snapshot
        run: cp /tmp/classified_items.json "data/$(date -u +%Y-%m-%d).json"

      - name: Generate detailed reports
        run: python scripts/generate_issue_reports.py 2>&1 || true

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Security Tracker Bot"
          git add data/ docs/data.json issues/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: daily security data refresh ($(date -u +%Y-%m-%d))" && git push)
        continue-on-error: true
