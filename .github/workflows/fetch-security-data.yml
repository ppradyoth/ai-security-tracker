name: Fetch Security Data

on:
  schedule:
    # Runs daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch security data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          python scripts/fetch_security_data.py > /tmp/security.json 2> /tmp/fetch.log
          cat /tmp/fetch.log >&2

      - name: Save daily snapshot
        run: |
          cp /tmp/security.json "data/$(date -u +%Y-%m-%d).json"
          echo "✅ Snapshot saved: data/$(date -u +%Y-%m-%d).json"

      - name: Update latest summary
        run: |
          cp /tmp/security.json data/latest.json
          echo "Latest snapshot updated"

      - name: Generate dashboard data
        run: |
          mkdir -p docs
          python scripts/generate_dashboard_data.py /tmp/security.json > docs/data.json 2>&1
          echo "✅ Dashboard data generated"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Security Tracker"
          git add data/ docs/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update security data for $(date -u +%Y-%m-%d)" && git push)
        continue-on-error: true
